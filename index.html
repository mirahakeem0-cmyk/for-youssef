<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For Youssef 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ffb6d5,#fff,#ffd6e7,#fff);
background-size:400% 400%;
animation:grad 10s ease infinite;
}

@keyframes grad{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* CARD */
.container{
width:92%;
max-width:500px;
padding:25px;
background:rgba(255,255,255,0.5);
backdrop-filter:blur(12px);
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
position:relative;
}

/* TEXT */
h1{
font-size:clamp(18px,4vw,26px);
color:#ff2f7d;
margin-bottom:15px;
}

/* BUTTONS */
button{
padding:12px 20px;
border:none;
border-radius:40px;
font-size:14px;
cursor:pointer;
transition:0.3s;
position:absolute;
}

.yes{
background:#ff2f7d;
color:white;
left:25%;
}

.no{
background:#222;
color:white;
left:55%;
}

button:active{
transform:scale(0.95);
}

.hidden{display:none;}

.buttons{
height:110px;
position:relative;
}

/* SLIDER */
input[type=range]{
width:100%;
}

/* HEARTS */
.heart{
position:absolute;
font-size:18px;
color:#ff3b7f;
animation:float 4s linear forwards;
}

@keyframes float{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-700px);opacity:0}
}

/* MEME BOX */
.meme{
width:100%;
max-height:220px;
border-radius:15px;
margin-top:10px;
object-fit:cover;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

/* FINAL */
.final{
font-size:clamp(22px,5vw,34px);
color:#ff1f6a;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

</style>
</head>

<body>

<div class="container">

<!-- STEP 1 -->
<div id="s1">
<h1>هاي يوسف… ممكن تسامحني؟ 🤍</h1>

<div class="buttons">
<button class="yes" onclick="go(2)">Yes 💖</button>
<button class="no" id="no1">No 😭</button>
</div>
</div>

<!-- STEP 2 MEME -->
<div id="s2" class="hidden">
<h1>بتحب باباك ومامتك قد ايه؟ ❤️</h1>

<img class="meme" src="https://i.imgflip.com/4/4t0m5.jpg" />

<input type="range" min="0" max="100" value="100">

<br><br>
<button class="yes" onclick="go(3)">Next 🤍</button>
</div>

<!-- STEP 3 MEME -->
<div id="s3" class="hidden">
<h1>طيب بتحبني أنا قد ايه؟ 🤍</h1>

<img class="meme" src="https://i.imgflip.com/2/1ur9b0.jpg" />

<input type="range" min="0" max="100" value="100">

<br><br>
<button class="yes" onclick="go(4)">Next 💕</button>
</div>

<!-- STEP 4 -->
<div id="s4" class="hidden">
<h1>ممكن ننزل بكرا؟ 🥺</h1>

<div class="buttons">
<button class="yes" onclick="go(5)">آه طبعًا 😌</button>
<button class="no" id="no2">No 😭</button>
</div>
</div>

<!-- STEP 5 -->
<div id="s5" class="hidden">
<h1>اختار الميعاد 👀</h1>

<button class="yes" onclick="go(6)" style="position:relative;margin:8px;">4 PM ☕</button>
<button class="yes" onclick="go(6)" style="position:relative;margin:8px;">6 PM 🌆</button>
<button class="yes" onclick="go(6)" style="position:relative;margin:8px;">8 PM 🍽️</button>
</div>

<!-- FINAL -->
<div id="s6" class="hidden">
<h1 class="final">I Love You More 🤍</h1>
<p>See you tomorrow 😌✨</p>
</div>

</div>

<script>

// NAVIGATION
function go(n){
for(let i=1;i<=6;i++){
document.getElementById("s"+i).classList.add("hidden");
}
document.getElementById("s"+n).classList.remove("hidden");
hearts();
}

// HEARTS
function hearts(){
for(let i=0;i<15;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
h.style.top="100vh";
document.body.appendChild(h);
setTimeout(()=>h.remove(),4000);
}
}

// RUNAWAY BUTTONS 😂
function runaway(btn){
btn.addEventListener("mouseover",()=>{
btn.style.top=Math.random()*250+"px";
btn.style.left=Math.random()*70+"%";

btn.innerHTML=[
"لا كدا مينفعش 😂",
"يوسف ركز 😌",
"مش هينفع تهرب",
"فكر تاني 👀"
][Math.floor(Math.random()*4)];
});
}

runaway(document.getElementById("no1"));
runaway(document.getElementById("no2"));

</script>

</body>
</html>
